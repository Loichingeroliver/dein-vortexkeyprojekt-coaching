<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dein-vortexkeyprojekt-coaching</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      max-width: 600px;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
    }

    header p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #555;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #4a7c59;
      box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #4a7c59;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #3a6347; }
    button[type="submit"]:active { transform: scale(0.98); }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Vortexkey Projekt Coaching</h1>
    <p>
      Individuelles Coaching für dein persoenliches Schlüsselprojekt &ndash;
      strukturiert, fokussiert und auf dein Ziel ausgerichtet.
    </p>
  </header>

  <main class="card">
    <h2>Schreib mir</h2>
    <!--
      Ersetze "YOUR_FORM_ID" mit deiner eigenen Formspree-ID.
      Registrierung unter https://formspree.io – kostenloser Plan reicht fuer den Start.
    -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Dein Name" required />
      </div>

      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" placeholder="deine@email.de" required />
      </div>

      <div class="form-group">
        <label for="message">Nachricht</label>
        <textarea id="message" name="message" placeholder="Wie kann ich dir helfen?" required></textarea>
      </div>

      <button type="submit">Nachricht senden</button>
    </form>
  </main>

  <footer>
    &copy; 2026 dein-vortexkeyprojekt-coaching
  </footer>

</body>
</html>
